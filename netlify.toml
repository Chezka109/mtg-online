[build]
  command = "npm -w shared run build && npm -w client run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "24"

[[headers]]
  for = "/*"

  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

